<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEREBRO 0.512 - AI BIOMETRICS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top, #1a1c2e 0%, #06070a 100%); }
        .glass-card {
            background: rgba(15, 17, 26, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 62, 62, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-text { color: #ff3e3e; text-shadow: 0 0 15px rgba(255, 62, 62, 0.6); }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #ff3e3e, transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="text-slate-100 font-sans p-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-black italic neon-text tracking-tighter">CEREBRO 0.512</h1>
            <p class="text-[9px] uppercase tracking-[0.3em] text-slate-500">Neural Performance OS</p>
        </div>
        <div class="text-right">
            <span class="block text-[10px] text-slate-400 font-mono">LATENCY: 12ms</span>
            <span class="text-emerald-500 font-bold text-xs">● AI ACTIVE</span>
        </div>
    </div>

    <div class="glass-card rounded-3xl overflow-hidden mb-8 relative border border-rose-500/20">
        <div class="absolute top-0 left-0 w-full scan-line z-10"></div>
        <div class="bg-slate-900 h-56 flex flex-col items-center justify-center relative">
            <i class="fa-solid fa-expand text-slate-800 text-9xl absolute opacity-20"></i>
            <i class="fa-solid fa-camera-retro text-rose-500 text-4xl mb-4"></i>
            <button onclick="startCamera()" class="bg-rose-600 px-6 py-2 rounded-full font-black text-xs tracking-widest shadow-lg shadow-rose-900/50">
                ACTIVAR ESCÁNER IA
            </button>
            <p class="text-[9px] mt-4 text-slate-500 font-mono uppercase tracking-tighter">Detectando puntos de articulación...</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="glass-card p-4 rounded-2xl border-l-4 border-blue-500">
            <span class="text-[10px] text-slate-500 block uppercase">Hidratación</span>
            <span class="text-xl font-black">1.5 <span class="text-xs text-slate-600">/ 3L</span></span>
        </div>
        <div class="glass-card p-4 rounded-2xl border-l-4 border-rose-500">
            <span class="text-[10px] text-slate-500 block uppercase">Fatiga CNS</span>
            <span class="text-xl font-black text-rose-400">15% <i class="fa-solid fa-chart-line text-[10px]"></i></span>
        </div>
    </div>

    <div class="glass-card p-6 rounded-3xl mb-24">
        <h3 class="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest">Ajuste de Carga IA</h3>
        <p class="text-sm leading-relaxed mb-6 italic text-slate-300">
            "Basado en tu velocidad de ejecución previa, hoy el 1-RM estimado ha subido a <span class="text-white font-bold">124kg</span>. ¿Deseas aplicar la progresión?"
        </p>
        <div class="flex gap-4">
            <button class="flex-1 bg-white text-black p-4 rounded-xl font-black text-xs uppercase tracking-tighter">Aplicar Ajuste</button>
            <button class="flex-1 glass-card p-4 rounded-xl font-black text-xs uppercase tracking-tighter border-slate-700 text-slate-400 italic">Ignorar</button>
        </div>
    </div>

    <script>
        function startCamera() {
            alert("IA: Iniciando motor de visión... Solicita acceso a cámara en el navegador.");
        }
    </script>
</body>
</html>
