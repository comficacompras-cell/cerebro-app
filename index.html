<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebro Adaptativo Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center h-screen font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Cerebro Adaptativo</h1>
        
        <div class="mb-6">
            <p class="text-sm text-gray-500 uppercase tracking-widest">Dificultad Actual</p>
            <div id="difficulty-display" class="text-6xl font-black text-blue-600 transition-all duration-300">1.0</div>
        </div>

        <div id="status-badge" class="hidden mb-6 p-2 bg-red-100 text-red-700 rounded-lg font-semibold animate-pulse">
            ⚠️ REPASO DE FUNDAMENTOS ACTIVADO
        </div>

        <div class="flex gap-4">
            <button onclick="handleSuccess()" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform active:scale-95 transition-all">
                Acierto ✅
            </button>
            <button onclick="handleFailure()" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform active:scale-95 transition-all">
                Fallo ❌
            </button>
        </div>

        <button onclick="reset()" class="mt-8 text-gray-400 hover:text-gray-600 text-sm underline">Reiniciar sesión</button>
    </div>

    <script>
        let difficulty = 1.0;
        let failures = 0;

        function updateUI() {
            document.getElementById('difficulty-display').innerText = difficulty.toFixed(3);
            if (failures >= 3) {
                document.getElementById('status-badge').classList.remove('hidden');
                document.getElementById('difficulty-display').classList.replace('text-blue-600', 'text-red-600');
            } else {
                document.getElementById('status-badge').classList.add('hidden');
                document.getElementById('difficulty-display').classList.replace('text-red-600', 'text-blue-600');
            }
        }

        function handleSuccess() {
            failures = 0; // Se resetea el contador de fallos
            updateUI();
        }

        function handleFailure() {
            failures++;
            difficulty = difficulty * 0.8; // Tu fórmula de reducción del 20%
            updateUI();
        }

        function reset() {
            difficulty = 1.0;
            failures = 0;
            updateUI();
        }
    </script>
</body>
</html>
