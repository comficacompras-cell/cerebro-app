<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEREBRO 0.512 - AI ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        body { background: #06070a; color: #e2e8f0; overflow-x: hidden; }
        .glass-card { background: rgba(15, 17, 26, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 62, 62, 0.2); }
        .neon-text { color: #ff3e3e; text-shadow: 0 0 10px rgba(255, 62, 62, 0.5); }
        #video-container { position: relative; width: 100%; border-radius: 24px; overflow: hidden; background: #000; }
        #webcam { width: 100%; height: auto; transform: scaleX(-1); }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    </style>
</head>
<body class="p-4 pb-28">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black italic neon-text tracking-tighter uppercase">Cerebro 0.512</h1>
            <p class="text-[9px] text-slate-500 font-mono">BIOMECHANICAL ENGINE v2.0</p>
        </div>
        <div id="status" class="text-[9px] font-mono text-rose-500 animate-pulse font-bold">READY TO SCAN</div>
    </header>

    <div id="video-container" class="glass-card shadow-2xl shadow-rose-900/20">
        <video id="webcam" playsinline></video>
        <canvas id="output_canvas"></canvas>
        
        <div id="controls" class="absolute inset-0 flex items-center justify-center bg-black/60 z-20">
            <button onclick="startAI()" class="bg-rose-600 p-5 rounded-full shadow-lg shadow-rose-900/50 active:scale-90 transition-all">
                <i class="fa-solid fa-play text-white text-2xl"></i>
            </button>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-3 my-6">
        <div class="glass-card p-3 rounded-xl text-center">
            <p class="text-[8px] text-slate-500 uppercase mb-1">Ángulo Rodilla</p>
            <p id="angle-val" class="text-lg font-black font-mono text-emerald-400">--°</p>
        </div>
        <div class="glass-card p-3 rounded-xl text-center">
            <p class="text-[8px] text-slate-500 uppercase mb-1">Velocidad</p>
            <p class="text-lg font-black font-mono">0.0<span class="text-[10px]">m/s</span></p>
        </div>
        <div class="glass-card p-3 rounded-xl text-center border-rose-500/40">
            <p class="text-[8px] text-slate-500 uppercase mb-1">Confianza IA</p>
            <p id="conf-val" class="text-lg font-black font-mono text-rose-500">0%</p>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status');

        function onResults(results) {
            // Ajustar canvas al tamaño del video
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.poseLandmarks) {
                statusText.innerText = "SISTEMA ANALIZANDO ARTICULACIONES...";
                document.getElementById('conf-val').innerText = "98%";
                
                // Dibujar conectores (huesos)
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS,
                    {color: '#ff3e3e', lineWidth: 4});
                // Dibujar puntos (articulaciones)
                drawLandmarks(canvasCtx, results.poseLandmarks,
                    {color: '#ffffff', lineWidth: 2, radius: 3});
            }
            canvasCtx.restore();
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        function startAI() {
            document.getElementById('controls').style.display = 'none';
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await pose.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            camera.start();
        }
    </script>
</body>
</html>
