<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL FIT - AI ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        body { background: #0a0c10; color: #e2e8f0; font-family: sans-serif; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .blue-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        #video-container { position: relative; width: 100%; border-radius: 30px; overflow: hidden; background: #000; border: 2px solid #1e293b; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-black italic text-blue-500 tracking-tighter uppercase">NEURAL FIT</h1>
            <p class="text-[10px] text-amber-500 font-mono tracking-[0.2em]">0.512 ENGINE ACTIVE</p>
        </div>
        <div class="h-10 w-10 rounded-full border-2 border-amber-500 flex items-center justify-center">
            <span class="text-[10px] font-bold text-amber-500 italic">NF</span>
        </div>
    </header>

    <div id="video-container" class="blue-glow mb-6">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
        <div id="loading" class="absolute inset-0 flex items-center justify-center bg-black/80 z-10">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                <p class="text-blue-400 font-mono text-xs uppercase">Cargando Redes Neurales...</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-900/50 p-4 rounded-2xl gold-border">
            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest mb-1">Ángulo Rodilla</p>
            <p id="angle-display" class="text-3xl font-black font-mono text-blue-400">0°</p>
        </div>
        <div class="bg-slate-900/50 p-4 rounded-2xl gold-border">
            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest mb-1">Velocidad m/s</p>
            <p class="text-3xl font-black font-mono text-amber-500">0.00</p>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const angleDisplay = document.getElementById('angle-display');
        const loader = document.getElementById('loading');

        function calculateAngle(A, B, C) {
            let radians = Math.atan2(C.y - B.y, C.x - B.x) - Math.atan2(A.y - B.y, A.x - B.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return Math.round(angle);
        }

        function onResults(results) {
            loader.style.display = 'none';
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.poseLandmarks) {
                // Dibujar el esqueleto con color Azul Neón
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#3b82f6', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#ffffff', lineWidth: 2, radius: 4});

                // Calcular Ángulo de Rodilla (Cadera, Rodilla, Tobillo)
                const hip = results.poseLandmarks[24];
                const knee = results.poseLandmarks[26];
                const ankle = results.poseLandmarks[28];
                
                if (hip && knee && ankle) {
                    const angle = calculateAngle(hip, knee, ankle);
                    angleDisplay.innerText = angle + "°";
                }
            }
            canvasCtx.restore();
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
